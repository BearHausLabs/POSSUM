# JavaPOS Configuration
# This file tells JavaPOS to use XML-based configuration
# The actual device configuration is in devcon.xml (loaded via System properties in DeviceMain.java)

jpos.config.regPopulatorClass=jpos.config.simple.xml.SimpleXmlRegPopulator
jpos.config.populator.file=devcon.xml
jpos.config.serviceManagerClass=jpos.loader.simple.SimpleServiceManager

