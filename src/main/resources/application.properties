# Actuator
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=info, health

# Logging
logging.file.path=/var/log/target/possum/
springdoc.swagger-ui.disable-swagger-default-url=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# POSKeyboard Configuration (set enabled=true to use)
poskeyboard.enabled=false
poskeyboard.logicalName=POSKeyboard1
poskeyboard.claimTimeout=5000
poskeyboard.dataTimeout=10000

# ToneIndicator Configuration (set enabled=true to use)
toneindicator.enabled=false
toneindicator.logicalName=ToneIndicator1
toneindicator.claimTimeout=5000
toneindicator.defaultFrequency=1000
toneindicator.defaultDuration=200

# KeyLock Configuration (set enabled=true to use)
keylock.enabled=false
keylock.logicalName=Keylock1
keylock.claimTimeout=5000
keylock.pollInterval=100